spring:
  application:
    name: spring-rest

  datasource:
    url: jdbc:mysql://localhost:3307/hr_management?allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 9090

jwt:
  secret: thisis256bitsecretkeythatis256bitsecretkeythatis256bitsecretkey
  expiration: 86400000

app:
  upload:
    base-dir: uploads
    max-size-bytes: 5242880

    allowed-extensions:
      - jpg
      - jpeg
      - png
      - gif
      - webp

    allowed-folders:
      - avatars
      - logos